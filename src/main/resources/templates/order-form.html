<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа — STORE</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<header>
    <div class="header-content">
        <a href="/" class="logo">STORE</a>
        <div class="search-bar">
            <input type="text" placeholder="Поиск товаров…" aria-label="Поиск">
        </div>
        <a th:href="@{/cart}" class="cart-icon" th:title="'Корзина: ' + ${cartTotalAmount} + ' ₽'">
            🛒 <span th:text="${cartItemCount} ?: 0"></span>
        </a>
    </div>
</header>

<main>
    <div class="cart-container">
        <div class="cart-header">
            <h1>Оформление заказа</h1>
        </div>

        <div th:if="${errorMessage}" class="empty-cart" style="color: #e53e3e; margin: 20px;">
            <span th:text="${errorMessage}"></span>
        </div>

        <form method="post" style="padding: 20px;">
            <div class="form-group">
                <label for="customerName">Ваше имя</label>
                <input type="text" id="customerName" name="customerName" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 999-99-99">
            </div>
            <div class="form-group">
                <label for="address">Адрес доставки</label>
                <input type="text" id="address" name="address" required placeholder="Город, улица, дом, квартира">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Подтвердить заказ</button>
        </form>

        <div style="padding: 20px; text-align: center;">
            <a href="/cart" class="back-link">← Вернуться в корзину</a>
        </div>
    </div>
</main>

</body>
</html>
