<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование товара</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header>
    <div class="header-content">
        <a href="/" class="logo">STORE Admin</a>
    </div>
</header>

<main style="max-width: 600px;">
    <h1>Редактирование товара</h1>

    <form method="post" th:action="@{/products/update}" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-group">
            <label>Название</label>
            <input type="text" name="name" th:value="${product.name}" required>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" th:text="${product.description}"></textarea>
        </div>

        <div class="form-group">
            <label>Цена</label>
            <input type="number" step="0.01" name="price" th:value="${product.price}" required>
        </div>

        <div class="form-group">
            <label>Категория</label>
            <input type="text" name="category" th:value="${product.category}" required>
        </div>

        <div class="form-group">
            <label>Изображение</label>
            <input type="file" name="image" accept="image/*">
            <div th:if="${product.imageUrl}" style="margin-top: 8px;">
                Текущее изображение:
                <img th:src="${product.imageUrl}" style="height: 50px;">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/products" class="btn btn-secondary">Отмена</a>
    </form>
</main>
</body>
</html>
